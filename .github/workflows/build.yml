name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flet Kur
        run: pip install flet

      - name: APK Derle
        run: flet build apk

      - name: APK'yı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Kupon-Tahmin-Uygulamasi
          path: build/apk/app-release.apk
